<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neptun-Lite V2 - View Test</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f7;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            background: white;
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-section h2 {
            margin-top: 0;
            color: #6366f1;
            border-bottom: 2px solid #6366f1;
            padding-bottom: 0.5rem;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 0.25rem;
            font-size: 1rem;
        }
        button:hover { background: #4f46e5; }
        .status {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 6px;
            font-size: 0.875rem;
        }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.75rem;
        }
        .view-test {
            border: 2px solid #6366f1;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 8px;
        }
        .view { display: none; padding: 1rem; background: #f9fafb; }
        .view.active { display: block; }
        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <h1>🧪 Neptun-Lite V2 - View Switching Test</h1>
    
    <div class="test-section">
        <h2>1. DOM Element Test</h2>
        <div id="dom-results"></div>
        <button onclick="testDOM()">Test DOM Elements</button>
    </div>
    
    <div class="test-section">
        <h2>2. View Switching Test</h2>
        <div id="view-results"></div>
        <div class="view-test">
            <div id="day-view" class="view view-day active">
                <h3>Day View</h3>
                <p>Day view content</p>
            </div>
            <div id="week-view" class="view view-week" hidden>
                <h3>Week View</h3>
                <p>Week view content</p>
            </div>
            <div id="month-view" class="view view-month" hidden>
                <h3>Month View</h3>
                <p>Month view content</p>
            </div>
        </div>
        <button onclick="testSwitchView('day')">Switch to Day</button>
        <button onclick="testSwitchView('week')">Switch to Week</button>
        <button onclick="testSwitchView('month')">Switch to Month</button>
    </div>
    
    <div class="test-section">
        <h2>3. Empty State Test</h2>
        <div id="empty-results"></div>
        <div class="view-test">
            <div id="day-events"></div>
            <div id="day-empty" class="empty-state" hidden>
                <p>Nincs óra ezen a napon</p>
            </div>
        </div>
        <button onclick="testEmptyState(true)">Show Events</button>
        <button onclick="testEmptyState(false)">Show Empty</button>
    </div>
    
    <div class="test-section">
        <h2>4. Alert Test</h2>
        <div id="alert-results"></div>
        <button onclick="testAlert()">Test UI Alert (no browser alert)</button>
    </div>
    
    <script>
        // Test DOM elements
        function testDOM() {
            const results = document.getElementById('dom-results');
            const tests = [
                { id: 'day-view', name: 'Day View' },
                { id: 'week-view', name: 'Week View' },
                { id: 'month-view', name: 'Month View' },
                { id: 'day-empty', name: 'Day Empty' },
                { id: 'day-events', name: 'Day Events' }
            ];
            
            let html = '';
            tests.forEach(test => {
                const el = document.getElementById(test.id);
                const pass = el !== null;
                html += `<div class="status ${pass ? 'pass' : 'fail'}">
                    ${pass ? '✓' : '✗'} ${test.name}: ${pass ? 'Found' : 'NOT FOUND'}
                </div>`;
            });
            results.innerHTML = html;
        }
        
        // Test view switching
        function testSwitchView(viewName) {
            const results = document.getElementById('view-results');
            
            // Hide all views
            document.getElementById('day-view').hidden = true;
            document.getElementById('week-view').hidden = true;
            document.getElementById('month-view').hidden = true;
            
            // Show selected view
            if (viewName === 'day') {
                document.getElementById('day-view').hidden = false;
            } else if (viewName === 'week') {
                document.getElementById('week-view').hidden = false;
            } else if (viewName === 'month') {
                document.getElementById('month-view').hidden = false;
            }
            
            // Check visibility
            const dayVisible = !document.getElementById('day-view').hidden;
            const weekVisible = !document.getElementById('week-view').hidden;
            const monthVisible = !document.getElementById('month-view').hidden;
            
            const expected = viewName === 'day' ? dayVisible : viewName === 'week' ? weekVisible : monthVisible;
            const othersHidden = viewName !== 'day' ? !dayVisible : viewName !== 'week' ? !weekVisible : !monthVisible;
            
            const pass = expected && othersHidden;
            
            results.innerHTML = `<div class="status ${pass ? 'pass' : 'fail'}">
                ${pass ? '✓' : '✗'} View switching: ${viewName} view ${expected ? 'visible' : 'HIDDEN'}, 
                others ${othersHidden ? 'hidden' : 'VISIBLE'}
            </div>`;
            
            console.log('View test:', { viewName, dayVisible, weekVisible, monthVisible, pass });
        }
        
        // Test empty state
        function testEmptyState(hasEvents) {
            const results = document.getElementById('empty-results');
            const eventsDiv = document.getElementById('day-events');
            const emptyDiv = document.getElementById('day-empty');
            
            if (hasEvents) {
                eventsDiv.innerHTML = '<div class="event-card">Test Event</div>';
                emptyDiv.hidden = true;
            } else {
                eventsDiv.innerHTML = '';
                emptyDiv.hidden = false;
            }
            
            const eventsVisible = eventsDiv.innerHTML.trim() !== '';
            const emptyVisible = !emptyDiv.hidden;
            
            const pass = hasEvents ? eventsVisible && emptyDiv.hidden : !eventsVisible && emptyVisible;
            
            results.innerHTML = `<div class="status ${pass ? 'pass' : 'fail'}">
                ${pass ? '✓' : '✗'} Empty state: hasEvents=${hasEvents}, 
                eventsVisible=${eventsVisible}, emptyVisible=${emptyVisible}
            </div>`;
        }
        
        // Test UI alert instead of browser alert
        function testAlert() {
            const results = document.getElementById('alert-results');
            
            // Create UI alert
            const alertDiv = document.createElement('div');
            alertDiv.style.cssText = 'position:fixed;top:20px;right:20px;background:#fef2f2;border:1px solid #fecaca;padding:1rem;border-radius:8px;max-width:400px;z-index:9999;';
            alertDiv.innerHTML = `
                <div style="display:flex;align-items:center;gap:0.5rem;color:#dc2626;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span>This is a UI alert (no browser alert!)</span>
                    <button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:#dc2626;cursor:pointer;">✕</button>
                </div>
            `;
            document.body.appendChild(alertDiv);
            
            results.innerHTML = '<div class="status pass">✓ UI alert shown (check top-right corner)</div>';
            
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.parentElement.removeChild(alertDiv);
                }
            }, 5000);
        }
        
        // Run initial tests
        window.onload = () => {
            testDOM();
            testSwitchView('day');
        };
    </script>
</body>
</html>
